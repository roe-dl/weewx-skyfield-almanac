[Almanac]
    
    # The labels to be used for the phases of the moon:
    moon_phases = Nueva, Creciente, Cuarto creciente, Creciente gibosa, Llena, Menguante gibosa, Cuarto menguante, Menguante
    
    # The labels to be used for the phases of the inner planets:
    mercury_phases = Nueva, Creciente, Cuarto creciente, Creciente gibosa, Llena, Menguante gibosa, Cuarto menguante, Menguante
    venus_phases = Nueva, Creciente, Cuarto creciente, Creciente gibosa, Llena, Menguante gibosa, Cuarto menguante, Menguante
    
